[phases.setup]
nixPkgs = ["...", "prisma-engines"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npx prisma generate"]

[phases.start]
cmds = [
  "node prisma/migrate-assignments.js",
  "npx prisma db push --skip-generate --accept-data-loss",
  "node prisma/seed.js || echo 'Seed failed, continuing with server start'",
  "node src/server.js"
]
